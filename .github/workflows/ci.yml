# CI — two parallel jobs gate every push and pull request.
#
# 1. ``frontend`` — TypeScript / lint / vitest / production build.
# 2. ``python``   — ruff / pyright / hardcoding-lint / pytest.
#
# Both jobs run on ``ubuntu-latest`` because we don't ship any platform-
# specific code (the launchd / systemd integration is shelled out, not
# tested here). Concurrency: pushes to the same branch cancel each
# other so a long-running CI never blocks a hotfix.
#
# Upstream-coupled tests:
# A few suites exercise the real upstream ``tools.approval`` contract and
# only work when hermes-agent is installed (plugin discovery loads it from
# the host venv). They guard themselves at module load with
# ``pytest.importorskip("tools.approval")`` so they auto-skip in this clean
# container and run locally under ``scripts/test.sh``. No --ignore /
# --deselect list is needed: the security, dashboard-proxy, and
# uninstall-rollback tests all run here — they monkeypatch ``hermes_home``
# via the ``quiet_hms_env`` fixture instead of importing hermes_constants.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # No `version:` here — action-setup reads it from package.json's
        # `packageManager` (pnpm@11.5.2). Pinning both errors with
        # ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: ESLint
        # Strict gate: `pnpm lint` is `eslint . --max-warnings 0`, so any error
        # OR warning fails CI. Warnings were ratcheted to zero in the
        # owner-review D6 pass — keep it at zero (fix, or justify with an
        # inline eslint-disable + reason).
        run: pnpm lint

      - name: Vitest
        run: pnpm vitest run --reporter=default

      - name: Production build
        # Catches Vite-only errors (Rollup bundling, PWA manifest, dist
        # output) that ``pnpm typecheck`` can't see on its own.
        run: pnpm build

  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check server/ tests/

      # Pyright is a HARD gate: server/ type-checks clean (0 errors). The
      # earlier 28 reportOptionalCall / type-narrowing errors (shim accessors
      # called without a None-guard, etc.) were cleared in the owner-review
      # D4 pass — see DEBT.md D4. Keep it at zero: add a None-guard / narrow,
      # don't reintroduce `continue-on-error`.
      - name: Pyright (type check)
        run: pyright server/

      - name: Hardcoding lint
        run: bash scripts/lint_no_hardcoding.sh

      - name: Pytest
        # No --ignore / --deselect list: upstream-coupled suites self-skip via
        # pytest.importorskip("tools.approval"); the security / dashboard-proxy /
        # uninstall tests run here. See the header note above.
        run: pytest tests/

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Browser smoke tests run the *built* SPA with the /api/* surface mocked
    # (route interception) — no Python backend / hermes-agent needed, so this
    # stays a clean front-end job. `playwright.config.ts` webServer builds +
    # previews dist/ automatically (owner review D13).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # No `version:` here — action-setup reads it from package.json's
        # `packageManager` (pnpm@11.5.2). Pinning both errors with
        # ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright tests
        run: pnpm e2e
